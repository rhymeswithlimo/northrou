<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profiles - Northrou</title>

    <link rel="icon" href="assets/favicon-dark.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" href="assets/favicon-light.svg" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/profiles.css">

    <script type="module" src="js/pages/profiles.js"></script>
</head>
<body>

    <div class="profiles__tagline">
        <span class="profiles__logo">
            <svg viewBox="0 0 2160 2160" aria-hidden="true">
                <path d="M1531,1080h0s599,0,599,0V30h-484.71c-315.22,17.98-565.29,279.28-565.29,599h0V30H30v484.71c17.98,315.22,279.28,565.29,599,565.29h0s-599,0-599,0v1050h484.71c315.22-17.98,565.29-279.28,565.29-599h0v599h1050v-484.71c-17.98-315.22-279.28-565.29-599-565.29Z"/>
            </svg>
        </span>
        <h1 class="profiles__title">Who's watching?</h1>
    </div>

    <main class="profiles">
        <ul class="profiles__list" id="profiles"></ul>

        <div class="profiles__manage">
            <a class="btn-bracket" href="settings.html">[ manage profiles ]</a>
        </div>
    </main>

    <template id="tpl-profile">
        <li>
            <a class="profile" href="index.html">
                <span class="profile__avatar">
                    <span class="profile__monogram" aria-hidden="true"></span>
                </span>
                <span class="profile__name"></span>
            </a>
        </li>
    </template>

    <template id="tpl-profile-add">
        <li>
            <a class="profile profile--add" href="">
                <span class="profile__avatar">
                    <span class="profile__monogram" aria-hidden="true">+</span>
                </span>
                <span class="profile__name">Add profile</span>
            </a>
        </li>
    </template>

</body>
</html>
