    <!-- Scroll down hide nav-bar -->
    <script>
        (function () {
            const nav = document.querySelector('header nav');
            if (!nav) return;

            const REVEAL_ZONE = 360; // px from top where nav always shows, regardless of direction
            const DELTA_THRESHOLD = 10; // ignore jitter smaller than this (mobile toolbar collapse, overscroll bounce)

            // clamp: iOS/Android rubber-banding can push scrollY negative or past maxScroll
            function getClampedY() {
                const maxY = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
                return Math.min(Math.max(window.scrollY, 0), maxY);
            }

            let lastY = getClampedY();
            let ticking = false;

            function updateNav() {
                const currentY = getClampedY();
                const delta = currentY - lastY;

                if (currentY <= REVEAL_ZONE) {
                    nav.classList.remove('nav-hidden');
                    lastY = currentY;
                } else if (Math.abs(delta) >= DELTA_THRESHOLD) {
                    // only act once the move is big enough to be a real scroll,
                    // not the browser chrome resizing the viewport
                    if (delta > 0) {
                        nav.classList.add('nav-hidden'); // scrolling down
                    } else {
                        nav.classList.remove('nav-hidden'); // scrolling up
                    }
                    lastY = currentY;
                }

                ticking = false;
            }

            window.addEventListener('scroll', function () {
                if (!ticking) {
                    window.requestAnimationFrame(updateNav);
                    ticking = true;
                }
            }, { passive: true });

            // Mobile address bar showing/hiding fires resize, not a real scroll intent.
            // Resync lastY so it isn't misread as a big scroll delta on the next event.
            let resizeTimer;
            window.addEventListener('resize', function () {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function () {
                    lastY = getClampedY();
                }, 100);
            }, { passive: true });
        })();
    </script>
