<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hide the page until its boot code decides to stay (base.css BOOT GATE),
         so a redirect lands on a blank screen instead of flashing this page.
         The timeout is a backstop if a code path forgets to reveal(). -->
    <script>(function(d){d.classList.add('booting');setTimeout(function(){d.classList.remove('booting');},2000);})(document.documentElement);</script>

    <title>Home - Northrou</title>

    <link rel="icon" href="assets/favicon-dark.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" href="assets/favicon-light.svg" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css">

    <script type="module" src="js/pages/home.js"></script>
</head>
<body>
    <header class="site-header">
        <nav class="nav band" aria-label="Primary">
            <div class="nav__inner">
                <a class="nav__home" href="index.html" aria-label="Northrou home">
                    <svg viewBox="0 0 2160 2160" aria-hidden="true">
                        <path d="M1531,1080h0s599,0,599,0V30h-484.71c-315.22,17.98-565.29,279.28-565.29,599h0V30H30v484.71c17.98,315.22,279.28,565.29,599,565.29h0s-599,0-599,0v1050h484.71c315.22-17.98,565.29-279.28,565.29-599h0v599h1050v-484.71c-17.98-315.22-279.28-565.29-599-565.29Z"/>
                    </svg>
                </a>
                <ul class="nav__list">
                    <li><a href="#films">FILMS</a></li>
                    <li><a href="#shows">SHOWS</a></li>
                    <li class="u-noselect" aria-hidden="true">|</li>
                    <li><a href="settings.html">SETTINGS</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="u-visually-hidden">Home</h1>

        <section class="hero" id="hero" aria-label="Featured"></section>

        <section class="band" aria-label="Your library">
            <div class="rows" id="rows"></div>
        </section>
    </main>

    <!-- Detail modals are rendered here on demand, one at a time. -->
    <div id="detail-root"></div>

    <!-- ==================== TEMPLATES ==================== -->

    <template id="tpl-hero">
        <a class="hero__link" href="">
            <div class="hero__info">
                <p class="hero__title"></p>
                <p class="hero__meta u-mono"></p>
            </div>
            <img alt="">
        </a>
    </template>

    <template id="tpl-row">
        <section class="row">
            <h2 class="row__title"></h2>
            <p class="row__subtitle" hidden></p>
            <div class="row__items"></div>
        </section>
    </template>

    <!-- poster-only card ("You Might Like", "More Like This") -->
    <template id="tpl-card">
        <a class="card" href="">
            <div class="card__thumb"><img alt=""></div>
            <span class="card__reason" hidden></span>
        </a>
    </template>

    <!-- 16:9 card with progress ("Continue Watching") -->
    <template id="tpl-card-continue">
        <a class="card" href="">
            <div class="card__thumb"><img alt=""></div>
            <div class="card__info">
                <div class="progress"><div class="progress__bar"></div></div>
                <span class="card__title"></span>
                <span class="card__meta"></span>
            </div>
        </a>
    </template>

    <!-- circular avatar card (cast &amp; crew) -->
    <template id="tpl-card-person">
        <div class="card">
            <div class="card__thumb"><img alt=""></div>
            <div class="card__info">
                <span class="card__title"></span>
                <span class="card__meta"></span>
            </div>
        </div>
    </template>

    <template id="tpl-episode">
        <button type="button" class="episode">
            <div class="episode__thumb">
                <img alt="">
                <div class="progress"><div class="progress__bar"></div></div>
            </div>
            <div class="episode__info">
                <div class="episode__head">
                    <span class="episode__num"></span>
                    <span class="episode__title"></span>
                    <span class="episode__dur"></span>
                </div>
                <p class="episode__desc"></p>
            </div>
        </button>
    </template>

    <template id="tpl-detail">
        <div class="detail" aria-hidden="true">
            <div class="detail__dialog" role="dialog" aria-modal="true">
                <button class="detail__close" type="button" data-close aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>

                <div class="detail__hero"><img alt=""></div>

                <div class="detail__body">
                    <div class="detail__head">
                        <div class="detail__title">
                            <img alt="" draggable="false" hidden>
                            <p class="detail__title-text"></p>
                        </div>

                        <div class="detail__meta"></div>

                        <div class="detail__actions">
                            <button type="button" class="detail__play">
                                <span aria-hidden="true">&#9654;</span><span class="detail__play-label"></span>
                            </button>
                            <div class="detail__resume">
                                <div class="progress"><div class="progress__bar"></div></div>
                                <span class="detail__resume-left"></span>
                            </div>
                        </div>

                        <div class="detail__synopsis">
                            <p class="detail__tagline"></p>
                            <p class="detail__overview"></p>
                        </div>
                    </div>

                    <hr>

                    <section class="episodes">
                        <div class="episodes__header">
                            <h2 class="row__title">Episodes</h2>
                            <select class="episodes__season" aria-label="Select season"></select>
                        </div>
                        <div class="episodes__list"></div>
                    </section>

                    <hr>

                    <div class="detail__rows"></div>
                </div>
            </div>
        </div>
    </template>
</body>
</html>
