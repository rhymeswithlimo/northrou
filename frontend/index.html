<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hide the page until its boot code decides to stay (base.css BOOT GATE),
         so a redirect lands on a blank screen instead of flashing this page.
         The timeout is a backstop if a code path forgets to reveal(). -->
    <script>(function(d){d.classList.add('booting');setTimeout(function(){d.classList.remove('booting');},2000);})(document.documentElement);</script>

    <title>Home - Northrou</title>

    <link rel="icon" href="assets/favicon-dark.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" href="assets/favicon-light.svg" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/home.css">

    <script type="module" src="js/pages/home.js"></script>
</head>
<body>
    <header class="site-header">
        <nav class="nav band" aria-label="Primary">
            <div class="nav__inner">
                <a class="nav__home" href="index.html" aria-label="Northrou home">
                    <svg viewBox="0 0 2160 2160" aria-hidden="true">
                        <path d="M1531,1080h0s599,0,599,0V30h-484.71c-315.22,17.98-565.29,279.28-565.29,599h0V30H30v484.71c17.98,315.22,279.28,565.29,599,565.29h0s-599,0-599,0v1050h484.71c315.22-17.98,565.29-279.28,565.29-599h0v599h1050v-484.71c-17.98-315.22-279.28-565.29-599-565.29Z"/>
                    </svg>
                </a>
                <ul class="nav__list">
                    <li><a href="#films">FILMS</a></li>
                    <li><a href="#shows">SHOWS</a></li>
                    <li class="u-noselect" aria-hidden="true">|</li>
                    <li><a href="settings.html">SETTINGS</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="u-visually-hidden">Home</h1>

        <section class="hero" id="hero" aria-label="Featured"></section>

        <section class="band" aria-label="Your library">
            <div class="rows" id="rows"></div>
        </section>
    </main>

    <!-- Detail modals are rendered here on demand, one at a time. -->
    <div id="detail-root"></div>

    <!-- The full-screen player mounts here, one at a time. -->
    <div id="player-root"></div>

    <!-- ==================== TEMPLATES ==================== -->

    <template id="tpl-hero">
        <a class="hero__link" href="">
            <div class="hero__info">
                <p class="hero__title"></p>
                <p class="hero__meta u-mono"></p>
            </div>
            <img alt="">
        </a>
    </template>

    <template id="tpl-row">
        <section class="row">
            <h2 class="row__title"></h2>
            <p class="row__subtitle" hidden></p>
            <div class="row__items"></div>
        </section>
    </template>

    <!-- poster-only card ("You Might Like", "More Like This") -->
    <template id="tpl-card">
        <a class="card" href="">
            <div class="card__thumb"><img alt=""></div>
            <span class="card__reason" hidden></span>
        </a>
    </template>

    <!-- 16:9 card with progress ("Continue Watching") -->
    <template id="tpl-card-continue">
        <a class="card" href="">
            <div class="card__thumb"><img alt=""></div>
            <div class="card__info">
                <div class="progress"><div class="progress__bar"></div></div>
                <span class="card__title"></span>
                <span class="card__meta"></span>
            </div>
        </a>
    </template>

    <!-- circular avatar card (cast &amp; crew) -->
    <template id="tpl-card-person">
        <div class="card">
            <div class="card__thumb"><img alt=""></div>
            <div class="card__info">
                <span class="card__title"></span>
                <span class="card__meta"></span>
            </div>
        </div>
    </template>

    <template id="tpl-episode">
        <button type="button" class="episode">
            <div class="episode__thumb">
                <img alt="">
                <div class="progress"><div class="progress__bar"></div></div>
            </div>
            <div class="episode__info">
                <div class="episode__head">
                    <span class="episode__num"></span>
                    <span class="episode__title"></span>
                    <span class="episode__dur"></span>
                </div>
                <p class="episode__desc"></p>
            </div>
        </button>
    </template>

    <template id="tpl-detail">
        <div class="detail" aria-hidden="true">
            <div class="detail__dialog" role="dialog" aria-modal="true">
                <button class="detail__close" type="button" data-close aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>

                <div class="detail__hero"><img alt=""></div>

                <div class="detail__body">
                    <div class="detail__head">
                        <div class="detail__title">
                            <img alt="" draggable="false" hidden>
                            <p class="detail__title-text"></p>
                        </div>

                        <div class="detail__meta"></div>

                        <div class="detail__actions">
                            <button type="button" class="detail__play">
                                <span aria-hidden="true">&#9654;</span><span class="detail__play-label"></span>
                            </button>
                            <div class="detail__resume">
                                <div class="progress"><div class="progress__bar"></div></div>
                                <span class="detail__resume-left"></span>
                            </div>
                        </div>

                        <div class="detail__synopsis">
                            <p class="detail__tagline"></p>
                            <p class="detail__overview"></p>
                        </div>
                    </div>

                    <hr>

                    <section class="episodes">
                        <div class="episodes__header">
                            <h2 class="row__title">Episodes</h2>
                            <select class="episodes__season" aria-label="Select season"></select>
                        </div>
                        <div class="episodes__list"></div>
                    </section>

                    <hr>

                    <div class="detail__rows"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- Full custom player. The <video> carries no `controls`: the transport
         UI below is hand-built so it looks identical and behaves identically on
         the web, the desktop shell (WKWebView/WebView2), and mobile. Icons are
         inline SVG so the player pulls in no assets. -->
    <template id="tpl-player">
        <div class="player" role="dialog" aria-modal="true" aria-label="Video player" tabindex="-1">
            <video class="player__video" playsinline></video>

            <!-- Manually-rendered subtitle overlay (the <track> runs hidden so we
                 control size/background/position). -->
            <div class="player__subs" aria-hidden="true"></div>

            <!-- A tap anywhere on the stage toggles play/pause and wakes the
                 controls; it sits under the chrome so buttons still win a click. -->
            <button class="player__stage" type="button" tabindex="-1" aria-hidden="true"></button>

            <div class="player__spinner" aria-hidden="true"></div>

            <!-- Top chrome: the back button (kept from the old player) + title. -->
            <div class="player__top">
                <button class="player__close" type="button" data-close aria-label="Close player">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <span class="player__title"></span>
            </div>

            <!-- Bottom control bar. -->
            <div class="player__controls">
                <div class="player__seek" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
                    <div class="player__seek-track">
                        <div class="player__seek-buffered"></div>
                        <div class="player__seek-played"></div>
                        <div class="player__seek-knob"></div>
                    </div>
                </div>

                <div class="player__bar">
                    <button class="player__btn" type="button" data-action="play" aria-label="Play">
                        <svg class="i-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4v16l13-8z" fill="currentColor"/></svg>
                        <svg class="i-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h4v16H7zM13 4h4v16h-4z" fill="currentColor"/></svg>
                    </button>
                    <button class="player__btn" type="button" data-action="back10" aria-label="Back 10 seconds">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z" fill="currentColor"/><text x="12" y="15" font-size="7" font-family="Geist,sans-serif" text-anchor="middle" fill="currentColor">10</text></svg>
                    </button>
                    <button class="player__btn" type="button" data-action="fwd10" aria-label="Forward 10 seconds">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2l5 4-5 4V7a5 5 0 1 0 5 5h2a7 7 0 1 1-7-7z" fill="currentColor"/><text x="12" y="15" font-size="7" font-family="Geist,sans-serif" text-anchor="middle" fill="currentColor">10</text></svg>
                    </button>

                    <div class="player__volume">
                        <button class="player__btn" type="button" data-action="mute" aria-label="Mute">
                            <svg class="i-vol" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 5V4L8 9zm12.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z" fill="currentColor"/></svg>
                            <svg class="i-mute" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 5V4L8 9zm14 0l-2 2-2-2-1.4 1.4 2 2-2 2L14 17l2-2 2 2 1.4-1.4-2-2 2-2z" fill="currentColor"/></svg>
                        </button>
                        <input class="player__vol" type="range" min="0" max="1" step="0.02" value="1" aria-label="Volume">
                    </div>

                    <span class="player__time"><span class="player__cur">0:00</span> <span class="player__sep">/</span> <span class="player__dur">0:00</span></span>

                    <div class="player__spacer"></div>

                    <button class="player__btn player__cc" type="button" data-action="captions" aria-label="Subtitles" hidden>
                        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 11h1.5M8 13.5h2M13 11h3M13 13.5h2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                    </button>
                    <button class="player__btn" type="button" data-action="settings" aria-label="Settings">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 13a7.6 7.6 0 0 0 .1-1 7.6 7.6 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7.3 7.3 0 0 0-1.7-1l-.4-2.5H9.1L8.7 5a7.3 7.3 0 0 0-1.7 1l-2.4-1-2 3.4L2.6 11a7.6 7.6 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7.3 7.3 0 0 0 1.7 1l.4 2.5h5.8l.4-2.5a7.3 7.3 0 0 0 1.7-1l2.4 1 2-3.4z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
                    </button>
                    <button class="player__btn" type="button" data-action="fullscreen" aria-label="Fullscreen">
                        <svg class="i-fs" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        <svg class="i-fs-exit" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                </div>
            </div>

            <!-- Captions picker (populated per title). -->
            <div class="player__menu player__menu--captions u-hidden" role="menu" aria-label="Subtitles"></div>

            <!-- Settings: subtitle size, subtitle background, playback speed. -->
            <div class="player__menu player__menu--settings u-hidden" role="menu" aria-label="Player settings">
                <div class="player__menu-group" data-group="subsize">
                    <span class="player__menu-label">Subtitle size</span>
                    <div class="player__seg">
                        <button type="button" data-subsize="sm">S</button>
                        <button type="button" data-subsize="md">M</button>
                        <button type="button" data-subsize="lg">L</button>
                        <button type="button" data-subsize="xl">XL</button>
                    </div>
                </div>
                <div class="player__menu-group" data-group="subbg">
                    <span class="player__menu-label">Subtitle background</span>
                    <div class="player__seg">
                        <button type="button" data-subbg="on">On</button>
                        <button type="button" data-subbg="off">Off</button>
                    </div>
                </div>
                <div class="player__menu-group" data-group="speed">
                    <span class="player__menu-label">Playback speed</span>
                    <div class="player__seg">
                        <button type="button" data-speed="0.5">0.5&times;</button>
                        <button type="button" data-speed="1">1&times;</button>
                        <button type="button" data-speed="1.5">1.5&times;</button>
                        <button type="button" data-speed="2">2&times;</button>
                    </div>
                </div>
            </div>

            <p class="player__error u-hidden" role="alert"></p>

            <!-- Keyboard shortcut cheat-sheet (toggled with ?). -->
            <div class="player__shortcuts u-hidden" role="dialog" aria-label="Keyboard shortcuts">
                <h2>Keyboard shortcuts</h2>
                <dl>
                    <div><dt>Space / K</dt><dd>Play / pause</dd></div>
                    <div><dt>&larr; / &rarr;</dt><dd>Seek 10s</dd></div>
                    <div><dt>J / L</dt><dd>Seek 10s</dd></div>
                    <div><dt>&uarr; / &darr;</dt><dd>Volume</dd></div>
                    <div><dt>M</dt><dd>Mute</dd></div>
                    <div><dt>F</dt><dd>Fullscreen</dd></div>
                    <div><dt>C</dt><dd>Subtitles on / off</dd></div>
                    <div><dt>0&ndash;9</dt><dd>Jump to 0&ndash;90%</dd></div>
                    <div><dt>?</dt><dd>This help</dd></div>
                    <div><dt>Esc</dt><dd>Close</dd></div>
                </dl>
            </div>
        </div>
    </template>
</body>
</html>
