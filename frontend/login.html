<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hide the page until its boot code decides to stay (base.css BOOT GATE),
         so a redirect lands on a blank screen instead of flashing this page.
         The timeout is a backstop if a code path forgets to reveal(). -->
    <script>(function(d){d.classList.add('booting');setTimeout(function(){d.classList.remove('booting');},2000);})(document.documentElement);</script>

    <title>Login - Northrou</title>

    <link rel="icon" href="assets/favicon-dark.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" href="assets/favicon-light.svg" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/login.css">

    <script type="module" src="js/pages/login.js"></script>
</head>
<body>

    <section class="login">
        <!-- Decorative: the animation carries no information. -->
        <div class="login__art" aria-hidden="true">
            <canvas class="login__canvas" id="ascii"></canvas>
        </div>

        <div class="login__rule" aria-hidden="true"><div class="login__rule-line"></div></div>

        <main class="login__panel">
            <!-- ---------- step 1: email ---------- -->
            <section class="auth" id="step-email" aria-labelledby="step-email-title">
                <header class="auth__header">
                    <span class="auth__logo">
                        <svg viewBox="0 0 2160 2160" role="img" aria-label="Northrou">
                            <path d="M1531,1080h0s599,0,599,0V30h-484.71c-315.22,17.98-565.29,279.28-565.29,599h0V30H30v484.71c17.98,315.22,279.28,565.29,599,565.29h0s-599,0-599,0v1050h484.71c315.22-17.98,565.29-279.28,565.29-599h0v599h1050v-484.71c-17.98-315.22-279.28-565.29-599-565.29Z"/>
                        </svg>
                    </span>
                    <div>
                        <h1 class="auth__title" id="step-email-title">Get started</h1>
                        <p class="auth__subtitle">Login below to start using your account.</p>
                    </div>
                </header>

                <div class="auth__options">
                    <div class="auth__providers">
                        <button type="button" class="provider" data-provider="google">
                            <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Continue with Google
                            <span class="badge badge--last-used u-mono" data-last-used="google" hidden>Last used</span>
                        </button>
                        <button type="button" class="provider" data-provider="apple">
                            <svg viewBox="0 0 814 1000" width="814" height="1000" aria-hidden="true">
                                <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
                            </svg>
                            Continue with Apple
                            <span class="badge badge--last-used u-mono" data-last-used="apple" hidden>Last used</span>
                        </button>
                    </div>

                    <p class="auth__or u-mono">OR</p>

                    <form class="auth__form" id="email-form" novalidate>
                        <label for="email" class="auth__label u-mono">Email Address:</label>
                        <div class="auth__input-wrap">
                            <span class="badge badge--last-used u-mono" data-last-used="email" hidden>Last used</span>
                            <input type="email" id="email" name="email" class="auth__input"
                                   placeholder="you@example.com" autocomplete="email"
                                   required aria-describedby="email-error">
                        </div>
                        <button type="submit" class="auth__submit" id="send-code" disabled>Send Code</button>
                        <p class="form-error u-hidden" id="email-error" role="alert"></p>
                    </form>

                    <div class="auth__notice u-noselect">
                        <p>By using Northrou, you agree to our <a href="">Terms of Use</a> and <a href="">Privacy Policy</a>.</p>
                    </div>
                </div>
            </section>

            <!-- ---------- step 2: one-time code ---------- -->
            <section class="auth u-hidden" id="step-otp" aria-labelledby="step-otp-title">
                <button type="button" class="back-link" id="otp-back">
                    <span aria-hidden="true">&lt;</span><span>Back</span>
                </button>

                <header class="auth__header">
                    <span class="auth__logo">
                        <svg viewBox="0 0 2160 2160" role="img" aria-label="Northrou">
                            <path d="M1531,1080h0s599,0,599,0V30h-484.71c-315.22,17.98-565.29,279.28-565.29,599h0V30H30v484.71c17.98,315.22,279.28,565.29,599,565.29h0s-599,0-599,0v1050h484.71c315.22-17.98,565.29-279.28,565.29-599h0v599h1050v-484.71c-17.98-315.22-279.28-565.29-599-565.29Z"/>
                        </svg>
                    </span>
                    <div>
                        <h1 class="auth__title" id="step-otp-title">Enter your code</h1>
                        <p class="auth__subtitle">We sent a 6 digit code to your email. Enter it below.</p>
                    </div>
                </header>

                <form class="otp" id="otp-form" novalidate>
                    <fieldset class="otp__fields">
                        <legend class="u-visually-hidden">6 digit sign-in code</legend>
                        <div class="otp__group">
                            <input type="text" class="otp__input" maxlength="1" placeholder="-" inputmode="numeric" autocomplete="one-time-code" aria-label="Digit 1 of 6">
                            <input type="text" class="otp__input" maxlength="1" placeholder="-" inputmode="numeric" autocomplete="one-time-code" aria-label="Digit 2 of 6">
                            <input type="text" class="otp__input" maxlength="1" placeholder="-" inputmode="numeric" autocomplete="one-time-code" aria-label="Digit 3 of 6">
                        </div>
                        <div class="otp__group">
                            <input type="text" class="otp__input" maxlength="1" placeholder="-" inputmode="numeric" autocomplete="one-time-code" aria-label="Digit 4 of 6">
                            <input type="text" class="otp__input" maxlength="1" placeholder="-" inputmode="numeric" autocomplete="one-time-code" aria-label="Digit 5 of 6">
                            <input type="text" class="otp__input" maxlength="1" placeholder="-" inputmode="numeric" autocomplete="one-time-code" aria-label="Digit 6 of 6">
                        </div>
                    </fieldset>

                    <div class="otp__confirm">
                        <button type="submit" class="auth__submit" id="otp-submit">Sign in</button>
                        <p class="form-error u-hidden" id="otp-error" role="alert">Invalid or expired OTP.</p>
                    </div>
                </form>
            </section>
        </main>
    </section>

</body>
</html>
