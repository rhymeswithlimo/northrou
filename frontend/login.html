    <!-- ASCII login art -->
    <script>
        const canvas = document.getElementById('ascii');
        const ctx = canvas.getContext('2d');

        // ==================== TUNING ====================
        const SPHERE_SIZE = 0.45;
        const SCATTER_SIZE = 0.95;
        const EDGE_SOFTNESS = 30;
        const GLYPH_MARGIN = 1;
        const CHARS = ['n', 'o', 'r', 't', 'h', 'r', 'o', 'u'];
        const POINT_COUNT = 260;
        // ================================================

        let W, H, CX, CY, SAFE_RADIUS, RADIUS, SCATTER_RADIUS;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;

            const cssW = Math.max(rect.width, 1);
            const cssH = Math.max(rect.height, 1);

            canvas.width = Math.round(cssW * dpr);
            canvas.height = Math.round(cssH * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            
            // OPTIMIZATION: Set context properties once per resize instead of every frame
            ctx.font = "11px 'Geist Mono', monospace";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            W = cssW;
            H = cssH;
            CX = W / 2;
            CY = H / 2;
            SAFE_RADIUS = Math.max(Math.min(CX, CY) - GLYPH_MARGIN, 1);
            RADIUS = SAFE_RADIUS * SPHERE_SIZE;
            SCATTER_RADIUS = SAFE_RADIUS * SCATTER_SIZE;
        }

        resizeCanvas();

        let resizePending = false;
        const ro = new ResizeObserver(() => {
            if (resizePending) return;
            resizePending = true;
            requestAnimationFrame(() => {
                resizeCanvas();
                resizePending = false;
            });
        });
        ro.observe(canvas.parentElement);

        function buildPoints(n) {
            const pts = [];
            const golden = Math.PI * (3 - Math.sqrt(5));
            for (let i = 0; i < n; i++) {
                const y = 1 - (i / (n - 1)) * 2;
                const r = Math.sqrt(1 - y * y);
                const theta = golden * i;
                const x = Math.cos(theta) * r;
                const z = Math.sin(theta) * r;
                pts.push({
                    bx: x, by: y, bz: z,
                    tx: 0, ty: 0, tz: 0,
                    char: CHARS[Math.floor(Math.random() * CHARS.length)]
                });
            }
            return pts;
        }

        let points = buildPoints(POINT_COUNT);
        let angleX = 0.3;
        let angleY = 0;

        let state = 'formed';
        let stateTime = 0;
        const holdFormed = 5200;
        const unformDur = 2200;
        const holdNoise = 1800;
        const reformDur = 2600;

        function randomNoiseTarget() {
            const z = Math.random() * 2 - 1;
            const theta = Math.random() * Math.PI * 2;
            const s = Math.sqrt(1 - z * z);
            const r = Math.cbrt(Math.random());
            return {
                x: s * Math.cos(theta) * r,
                y: s * Math.sin(theta) * r,
                z: z * r
            };
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        let lastTime = performance.now();
        let isRunning = false;
        let animFrameId = null;

        function step(now) {
            if (!isRunning) return;

            const dt = now - lastTime;
            lastTime = now;
            
            // Cap delta time to prevent massive jumps if the tab was inactive
            const safeDt = Math.min(dt, 50); 
            stateTime += safeDt;

            angleY += safeDt * 0.0003;
            angleX = 0.35 + Math.sin(now * 0.0001) * 0.12;

            if (state === 'formed' && stateTime > holdFormed) {
                state = 'unforming';
                stateTime = 0;
                for (const p of points) {
                    const t = randomNoiseTarget();
                    p.tx = t.x; p.ty = t.y; p.tz = t.z;
                }
            } else if (state === 'unforming' && stateTime > unformDur) {
                state = 'noise';
                stateTime = 0;
            } else if (state === 'noise' && stateTime > holdNoise) {
                state = 'reforming';
                stateTime = 0;
                for (const p of points) {
                    if (Math.random() < 0.3) {
                        p.char = CHARS[Math.floor(Math.random() * CHARS.length)];
                    }
                }
            } else if (state === 'reforming' && stateTime > reformDur) {
                state = 'formed';
                stateTime = 0;
            }

            let mix = 0;
            if (state === 'formed') mix = 0;
            else if (state === 'unforming') mix = easeInOutCubic(stateTime / unformDur);
            else if (state === 'noise') mix = 1;
            else if (state === 'reforming') mix = 1 - easeInOutCubic(stateTime / reformDur);

            render(mix);
            animFrameId = requestAnimationFrame(step);
        }

        function render(mix) {
            ctx.clearRect(0, 0, W, H);
            
            const cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            const cosY = Math.cos(angleY), sinY = Math.sin(angleY);

            const scale = RADIUS + (SCATTER_RADIUS - RADIUS) * mix;
            const projected = [];

            for (const p of points) {
                const inv = 1 - mix;
                const lx = p.bx * inv + p.tx * mix;
                const ly = p.by * inv + p.ty * mix;
                const lz = p.bz * inv + p.tz * mix;

                let rx = lx * cosY - lz * sinY;
                let rz = lx * sinY + lz * cosY;
                let ry = ly * cosX - rz * sinX;
                rz = ly * sinX + rz * cosX;

                let px = CX + rx * scale;
                let py = CY + ry * scale;

                const dx = px - CX;
                const dy = py - CY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > SAFE_RADIUS) {
                    const overflow = dist - SAFE_RADIUS;
                    const compressed = SAFE_RADIUS +
                        EDGE_SOFTNESS * (1 - Math.exp(-overflow / EDGE_SOFTNESS));
                    const pullScale = compressed / dist;
                    px = CX + dx * pullScale;
                    py = CY + dy * pullScale;
                }

                const depth = (rz + 1.4) / 2.8;
                projected.push({ px, py, depth, char: p.char });
            }

            projected.sort((a, b) => a.depth - b.depth);

            for (const p of projected) {
                const alpha = 0.25 + p.depth * 0.9;
                ctx.fillStyle = `rgba(255,255,255,${Math.min(alpha, 1).toFixed(3)})`;
                ctx.fillText(p.char, p.px, p.py);
            }
        }

        // OPTIMIZATION: IntersectionObserver to pause the loop when hidden
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                if (!isRunning) {
                    isRunning = true;
                    lastTime = performance.now(); // Reset time so we don't jump
                    animFrameId = requestAnimationFrame(step);
                }
            } else {
                isRunning = false;
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                }
            }
        });
        
        // Start observing the parent container
        observer.observe(canvas.parentElement);
    </script>

    <!-- OTP code: inputs, pasting, etc. This is just the visual part, needs proper integration. -->
    <script>
        const inputs = [...document.querySelectorAll('.otp-input')];

        const fill = (digits, start = 0) => {
            const chars = [...digits].slice(0, inputs.length - start);
            chars.forEach((d, i) => (inputs[start + i].value = d));
            inputs[Math.min(start + chars.length, inputs.length) - 1].focus();
        };

        inputs.forEach((input, index) => {
            const prev = inputs[index - 1];
            const next = inputs[index + 1];

            // Let the browser handle standard text insertion cleanly.
            // We NO LONGER remove `maxlength="1"` because it keeps mobile keyboards stable.

            input.addEventListener('input', (e) => {
                // Catch autofill or pastes that dump multiple characters into one box
                if (input.value.length > 1) {
                    const digits = input.value.replace(/\D/g, '');
                    fill(digits, index);
                    return;
                }

                // Strip any non-numeric characters immediately
                input.value = input.value.replace(/\D/g, '');

                // Advance focus only AFTER the native input cycle completes
                if (input.value !== '' && next) {
                    next.focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                // Desktop/Standard backspace behavior when box is empty
                if (e.key === 'Backspace' && !input.value && prev) {
                    e.preventDefault();
                    prev.value = '';
                    prev.focus();
                }
                
                if (e.key === 'ArrowLeft' && prev) {
                    e.preventDefault();
                    prev.focus();
                }
                
                if (e.key === 'ArrowRight' && next) {
                    e.preventDefault();
                    next.focus();
                }
            });

            // Android Gboard specific fix: 
            // Gboard often sends 'deleteContentBackward' instead of a normal Backspace keydown.
            input.addEventListener('beforeinput', (e) => {
                if (e.inputType === 'deleteContentBackward' && !input.value && prev) {
                    e.preventDefault();
                    prev.value = '';
                    prev.focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const digits = (e.clipboardData || window.clipboardData)
                    .getData('text')
                    .replace(/\D/g, '');
                
                if (!digits) return;
                
                inputs.forEach((el) => (el.value = ''));
                fill(digits, 0);
            });
        });
    </script>

    <!-- Login flow: email validation, step switching, wrong-code feedback. This is just the visual part, needs proper integration. -->
    <script>
        const emailForm = document.getElementById('emailForm');
        const otpForm = document.getElementById('otpForm');
        const emailInput = document.getElementById('userEmail');
        const sendCodeBtn = document.getElementById('sendCode');
        const signInBtn = document.getElementById('signIn');
        const backBtn = document.getElementById('backBtn');

        // Deliberately stricter than type="email", which happily accepts "a@b".
        const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

        const setDisabled = (btn, off) => {
            btn.disabled = off;
            btn.classList.toggle('disabled', off);
        };

        const shake = (el) => {
            el.classList.remove('shake');
            void el.offsetWidth; // force reflow so the animation restarts
            el.classList.add('shake');
        };

        // ---------- step 1: email ----------

        const validateEmail = () => {
            setDisabled(sendCodeBtn, !EMAIL_RE.test(emailInput.value.trim()));
        };

        emailInput.addEventListener('input', validateEmail);
        validateEmail(); // covers browser-restored values on reload

        sendCodeBtn.addEventListener('click', () => {
            // Placeholder. The real version fires the send-code request here
            // and only advances on a success response.
            emailForm.classList.add('hidden');
            otpForm.classList.remove('hidden');
            inputs[0].focus();
        });

        // ---------- step 2: code ----------

        signInBtn.addEventListener('click', () => {
            const code = inputs.map((i) => i.value).join('');

            if (code.length < inputs.length) {
                shake(signInBtn);
                inputs.find((i) => !i.value).focus();
                return;
            }

            // Placeholder. Every code is wrong until this talks to a server.
            shake(signInBtn);
            inputs.forEach((i) => (i.value = ''));
            inputs[0].focus();
        });

        signInBtn.addEventListener('animationend', () => {
            signInBtn.classList.remove('shake');
        });

        backBtn.addEventListener('click', () => {
            otpForm.classList.add('hidden');
            emailForm.classList.remove('hidden');

            // Wiping the boxes on the way out. A half-typed code left sitting
            // there is a code for the old address, and the next step forward
            // may well be a different one.
            inputs.forEach((i) => (i.value = ''));
            emailInput.focus();
        });
    </script>
