<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hide the page until its boot code decides to stay (base.css BOOT GATE),
         so a redirect lands on a blank screen instead of flashing this page.
         The timeout is a backstop if a code path forgets to reveal(). -->
    <script>(function(d){d.classList.add('booting');setTimeout(function(){d.classList.remove('booting');},2000);})(document.documentElement);</script>

    <title>Connect - Northrou</title>

    <link rel="icon" href="assets/favicon-dark.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" href="assets/favicon-light.svg" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/setup.css">

    <script type="module" src="js/pages/connect.js"></script>
</head>
<body>

    <main class="setup">
        <div class="setup__panel">

            <!-- ---------- enter a code ---------- -->
            <section class="auth" id="step-code" aria-labelledby="t-code">
                <header class="auth__header">
                    <div>
                        <h1 class="auth__title" id="t-code">Connect to your server</h1>
                        <p class="auth__subtitle">Enter the connection code from your Northrou server.</p>
                    </div>
                </header>

                <div class="auth__options">
                    <form class="auth__form" id="code-form" novalidate>
                        <label for="code" class="auth__label u-mono">Connection code:</label>
                        <input type="text" id="code" class="auth__input input--mono" placeholder="NR-XXXX-XXXX"
                               autocomplete="off" autocapitalize="characters" spellcheck="false"
                               aria-describedby="code-error">

                        <details class="setup__details">
                            <summary class="setup__summary">Run your own coordinator?</summary>
                            <div class="setup__fields">
                                <label for="coord" class="auth__label u-mono">Coordination server:</label>
                                <input type="text" id="coord" class="auth__input"
                                       placeholder="Default: the hosted broker" autocomplete="off" spellcheck="false">
                                <p class="setup__hint">
                                    Only if your household runs its own coordinator. It brokers the
                                    handshake; media never passes through it.
                                </p>
                            </div>
                        </details>

                        <button type="submit" class="auth__submit" id="connect" disabled>Connect</button>
                        <p class="form-error u-hidden" id="code-error" role="alert"></p>
                    </form>
                </div>
            </section>

            <!-- ---------- connecting ---------- -->
            <section class="auth u-hidden" id="step-connecting" aria-labelledby="t-connecting">
                <header class="auth__header">
                    <div>
                        <h1 class="auth__title" id="t-connecting">Finding your server</h1>
                        <p class="auth__subtitle" id="connect-status" aria-live="polite">Connecting peer to peer...</p>
                    </div>
                </header>
            </section>

        </div>
    </main>

</body>
</html>
