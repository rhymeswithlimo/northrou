# GoReleaser configuration for Northrou.
# Builds the server binary for all six supported targets plus the coordination
# server, produces checksummed archives, and cuts a GitHub release.
#
# Usage:
#   goreleaser release --snapshot --clean   # local dry run
#   goreleaser release --clean              # real release (needs a git tag)
#
# The monorepo has two Go modules (backend/ and coordination/), so each build
# sets its own working directory via `dir`.
version: 2

project_name: northrou

# Default the signing pubkey to empty when the release environment does not set
# it, so a build without signing configured still works (updater falls back to
# checksums-only). Set NORTHROU_SIGNING_PUBKEY in CI to enable signature checks.
env:
  - NORTHROU_SIGNING_PUBKEY={{ if index .Env "NORTHROU_SIGNING_PUBKEY" }}{{ .Env.NORTHROU_SIGNING_PUBKEY }}{{ end }}

before:
  hooks:
    - sh -c "cd backend && go mod tidy"
    - sh -c "cd coordination && go mod tidy"

builds:
  - id: northrou
    dir: backend
    main: ./cmd/northrou
    binary: northrou
    env:
      - CGO_ENABLED=0 # pure-Go SQLite => trivial cross-compilation
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64, arm]
    goarm: ["7"]
    ignore:
      - { goos: darwin, goarch: arm }
      - { goos: windows, goarch: arm }
      - { goos: windows, goarch: arm64 }
    ldflags:
      - -s -w
      - -X github.com/rhymeswithlimo/northrou/backend/internal/buildinfo.Version={{ .Version }}
      - -X github.com/rhymeswithlimo/northrou/backend/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/rhymeswithlimo/northrou/backend/internal/buildinfo.Date={{ .Date }}
      # Embed the release-signing public key so `northrou update` requires a valid
      # Ed25519 signature over checksums.txt (fail-closed) before applying an
      # update. Set NORTHROU_SIGNING_PUBKEY (base64, from `nrsign -genkey`) in the
      # release environment; when unset the updater falls back to checksums-only
      # integrity (still fail-closed on a missing checksums file).
      - -X github.com/rhymeswithlimo/northrou/backend/internal/update.SigningPublicKey={{ .Env.NORTHROU_SIGNING_PUBKEY }}

  - id: coordinator
    dir: coordination
    main: ./cmd/coordinator
    binary: coordinator
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]

archives:
  - id: northrou
    ids: [northrou]
    # Produces e.g. northrou_1.2.0_linux_amd64.tar.gz / northrou_1.2.0_linux_armv7.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - NOTICE
      - README.md

  - id: coordinator
    ids: [coordinator]
    name_template: "coordinator_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

# Single checksums.txt covering every archive, consumed by `northrou update`.
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Sign checksums.txt with the Ed25519 release key, producing checksums.txt.sig,
# which `northrou update` verifies against the embedded public key before
# trusting the checksums (and thus the archive). Requires NORTHROU_SIGNING_KEY
# (base64 private key from `nrsign -genkey`) in the release environment; if the
# signing step is not configured, drop this block and updates fall back to
# checksums-only integrity.
signs:
  - id: checksums
    artifacts: checksum
    signature: "${artifact}.sig"
    # nrsign writes <artifact>.sig next to the (absolute) artifact path. Goes
    # through scripts/nrsign-sign.sh rather than an inline `sh -c` string: see
    # that file for why (goreleaser's ${artifact} substitution mangles a
    # literal "$0" if it's written directly in this YAML).
    cmd: scripts/nrsign-sign.sh
    args:
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]

release:
  github:
    owner: rhymeswithlimo
    name: northrou
  name_template: "Northrou {{ .Tag }}"
  draft: false
  prerelease: auto
